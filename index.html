<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title></title>
  </head>
  <body>
    <h1>ROCK PAPER SCISSORS</h1>
    <div class="container">
      <p id="user">Your Choice :</p>
      <p id="syschoice">Computer's Choice :</p>
      <p id="result">Result :</p>
      <button onclick="display()">Start</button>
    </div>
    <h1 class="heading">Select Your Choice</h1>
    <div class="btn-grp">
      <button onclick="calculateresult('rock')">
        Rock <i class="fa-solid fa-hand-back-fist"></i>
      </button>
      <button onclick="calculateresult('paper')">
        Paper <i class="fa-solid fa-hand"></i>
      </button>
      <button onclick="calculateresult('scissors')">
        Scissors <i class="fa-solid fa-scissors"></i>
      </button>
    </div>
    <script src="main.js"></script>
  </body>
</html>
